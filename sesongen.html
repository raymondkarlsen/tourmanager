<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sesongen — Tourmanager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tm-etappe {
      border: 1px solid #ece7d2;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
    }
    .tm-etappe summary {
      cursor: pointer;
      padding: 14px 18px;
      font-size: 1.05rem;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      align-items: baseline;
      list-style: none;
    }
    .tm-etappe summary::-webkit-details-marker { display: none; }
    .tm-pil {
      width: 9px;
      height: 9px;
      border-right: 2px solid var(--tekst-daus);
      border-bottom: 2px solid var(--tekst-daus);
      transform: rotate(45deg);
      transition: transform 0.15s ease;
      flex: none;
      align-self: center;
      margin-right: 4px;
    }
    .tm-etappe[open] .tm-pil { transform: rotate(225deg); }
    .tm-etappe[open] summary { border-bottom: 1px solid #ece7d2; }
    .tm-etappe summary:hover { background: #faf8ef; }
    .tm-teaser {
      margin-left: auto;
      font-weight: 600;
      color: #9a7d0a;
      white-space: nowrap;
    }
    .tm-innhold { padding: 4px 18px 18px; }
    .tm-kolonner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 32px;
      margin-bottom: 8px;
    }
    .tm-kolonner h4 { margin: 16px 0 6px; font-size: 1rem; }
    .tm-kolonner ol.rangering li { margin-bottom: 3px; font-size: 0.95rem; }
    .tm-hint, .tm-kilde {
      color: var(--tekst-daus);
      font-weight: 400;
      font-size: 0.85rem;
    }
    .tm-kilde { margin-top: 20px; }
    @media (max-width: 640px) {
      .tm-kolonner { grid-template-columns: 1fr; }
      .tm-teaser { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

<div class="side">

  <aside class="meny">
    <a href="index.html"><img class="logo" src="assets/logo.png" alt="Illustrasjon av syklist i gul trøye foran Eiffeltårnet"></a>
    <div class="sidenavn"><a href="index.html" style="text-decoration:none;color:inherit;">Tourmanager</a></div>
    <nav>
      <a href="gul-troye.html">Den gule trøya</a>
      <a href="maratontabellen.html">Maratontabellen</a>
      <a href="poengtabellen.html">Poengtabellen</a>
      <span class="gruppe"></span>
      <a href="statistikk.html">Statistikk og funfacts</a>
      <span class="gruppe"></span>
      <a href="sesong-for-sesong.html">Sesong for sesong</a>
    </nav>
  </aside>

  <main>
    <h1 id="tittel">Sesongen</h1>
    <div id="innhold"><p class="laster">Henter sesongen …</p></div>
  </main>
</div>

<footer>
  <div class="inner">
    <strong>Tourmanager</strong>
    <span>Bygget med GitHub Pages og Google Sheets</span>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<script src="js/motor.js"></script>
<script>
/* Redaksjonelle sesongoppsummeringer ("Kort om sesongen").
   Legg til nye år her etter hvert. */
const SESONGTEKSTER = {
  2025: `Pogacar som aldri ble ordentlig utfordret av Vingegaard. UnoX med
    Tobias Halland Johannessen på en fantastisk 6. plass sammenlagt og
    Abrahamsen med etappeseier. Healy i gult, MVDP, Lenny Martinez som
    jaktet alle sjanser på klatrepoeng, ungdomsrytterne Onley, Simmons og
    Lipowitz. Groves som reservespurter med suksess og Arensman som kongen
    i fjellene. Og en fascinerende regnværsavslutning der Wout van Aert
    klatret fra Pogacar før han vant opp Champs-Élysées.`,
};

/* Små ikoner for etappetypene. Tegnes som SVG i teksten,
   med etappetypen som forklaring når man holder over. */
function typeikon(type) {
  if (!type) return "";
  const s = 'width="17" height="17" viewBox="0 0 24 24" fill="none" ' +
    'stroke="#555" stroke-width="2" stroke-linecap="round" ' +
    'stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px;"';
  const ikoner = {
    flat:     `<svg ${s}><path d="M3 15h5l3-2 3 2h7"/></svg>`,
    kupert:   `<svg ${s}><path d="M2 17q3-7 6-7t4 4 4-6 6 2"/></svg>`,
    fjell:    `<svg ${s}><path d="M3 19L9 7l3 5 3-8 6 15Z"/></svg>`,
    tempo:    `<svg ${s}><circle cx="12" cy="13" r="7"/><path d="M12 13V9M10 3h4"/></svg>`,
    lagtempo: `<svg ${s}><circle cx="9" cy="13" r="6"/><path d="M9 13v-3M7.5 4.5h3"/><path d="M17 7a6 6 0 0 1 0 12"/></svg>`,
  };
  const ikon = ikoner[type.toLowerCase()] || "";
  return ikon ? `<span title="${type}">${ikon}</span>` : "";
}

/* Samme etappeikoner tegnet rett på canvas (til bruk i grafene, der
   HTML/SVG ikke kan legges inn). Formene følger de samme koordinatene
   som SVG-ene over (viewBox 0 0 24 24). */
function tegnEtappeikon(ctx, type, senterX, senterY, storrelse) {
  if (!type) return;
  const sirkel = (x, y, r) => { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke(); };
  const strek = (d) => ctx.stroke(new Path2D(d));
  const ikoner = {
    flat:     () => strek("M3 15h5l3-2 3 2h7"),
    kupert:   () => strek("M2 17q3-7 6-7t4 4 4-6 6 2"),
    fjell:    () => strek("M3 19L9 7l3 5 3-8 6 15Z"),
    tempo:    () => { sirkel(12, 13, 7); strek("M12 13V9M10 3h4"); },
    lagtempo: () => { sirkel(9, 13, 6); strek("M9 13v-3M7.5 4.5h3"); strek("M17 7a6 6 0 0 1 0 12"); },
  };
  const tegn = ikoner[type.toLowerCase()];
  if (!tegn) return;
  const skala = storrelse / 24;
  ctx.save();
  ctx.translate(senterX - storrelse / 2, senterY - storrelse / 2);
  ctx.scale(skala, skala);
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  tegn();
  ctx.restore();
}

/* Hvilket år? Leses fra adressen (sesongen.html?aar=2025).
   Uten parameter: pågående sesong, ellers nyeste ferdige. */
const oensketAar = new URLSearchParams(location.search).get("aar");

hentTourdata().then(data => {
  const f = formatTall;

  const aar = Number(oensketAar) ||
    (data.paagaaende && data.paagaaende.antallEtapper > 0
      ? data.paagaaende.aar
      : data.sesonger.at(-1)?.aar);

  document.getElementById("tittel").textContent = "Sesongen " + aar;
  document.title = "Sesongen " + aar + " — Tourmanager";

  const paagaar = data.paagaaende?.aar === aar;
  const sesong = data.sesonger.find(s => s.aar === aar);
  const etapper = data.etapper[aar] || [];

  /* Resultater: fra ferdig sesong, eller løpende hvis touren pågår */
  const resultater = sesong ? sesong.resultater
    : (paagaar ? data.paagaaende.resultater : null);

  if (!resultater) {
    document.getElementById("innhold").innerHTML =
      "<p>Fant ingen data for " + aar + ".</p>";
    return;
  }

  let html = "<h2>Resultater</h2>";
  if (paagaar) {
    html += `<p>Touren pågår! Stillingen etter ${etapper.length}
      etappe${etapper.length === 1 ? "" : "r"}:</p>`;
  }
  html += "<table class='data'><tr><th>#</th><th>Deltaker</th>" +
    "<th>Lagnavn</th><th>Poeng</th>" +
    (sesong ? "<th>% av vinner</th>" : "") + "</tr>" +
    resultater.map(r =>
      `<tr${r.plass === 1 ? " class='vinner'" : ""}>
       <td>${r.plass}</td><td><strong>${r.person}</strong></td>
       <td>${r.lagnavn}</td><td><strong>${f(r.poeng)}</strong></td>` +
      (sesong ? `<td>${String(r.prosentAvVinner).replace(".", ",")}&nbsp;%</td>` : "") +
      "</tr>").join("") + "</table>";

  if (SESONGTEKSTER[aar]) {
    html += `<h2 style="margin-top:40px;">Kort om ${aar}-sesongen</h2>
      <p>${SESONGTEKSTER[aar]}</p>`;
  }

  if (etapper.length > 0) {
    html += `
    <div class="skille skille--gul"></div>
    <h2>Etappepoeng</h2>
    <h3>Poengoversikt — etappe for etappe</h3>
    <div id="etappetabell"></div>

    <h2 style="margin-top:48px;">Utvikling gjennom rittet</h2>
    <h3>Stillingen — etappe for etappe</h3>
    <div style="position:relative;height:420px;">
      <canvas id="utvikling"></canvas>
    </div>

    <h2 style="margin-top:48px;">Poengforskjell på etapper</h2>
    <h3>Totalpoeng per etappe</h3>
    <p>Oversikten viser hvor mange poeng vi fikk tak i på hver etappe.</p>
    <div style="position:relative;height:${140 + etapper.length * 34}px;">
      <canvas id="perEtappe"></canvas>
    </div>`;
  }

  /* ---- Rytterstatistikk fra spilleverandøren, hvis den finnes for året --- */
  const ryttere = data.ryttere?.[aar] || [];
  if (ryttere.length > 0) {
    const kolonner = Object.keys(ryttere[0]).filter(k => k !== "aar");
    html += `
    <div class="skille skille--gul"></div>
    <h2>Statistikk om rytterne</h2>
    <p>Denne oversikten viser alle rytterne som deltok i ${aar}-utgaven
    av Tourmanager. Her ser du prisen, hvor mange poeng de tok og hvilken
    rolle de spilte for lagene våre. Tallene kommer fra spilleverandøren.</p>
    <details>
      <summary style="cursor:pointer;font-weight:600;margin-bottom:12px;">
        Vis tabellen (${ryttere.length} ryttere)</summary>
      <div style="overflow-x:auto;">
      <table class="data">
        <tr><th>#</th>${kolonner.map(k =>
          `<th>${k.charAt(0).toUpperCase() + k.slice(1)}</th>`).join("")}</tr>
        ${ryttere.map((rad, i) => `<tr><td>${i + 1}</td>${kolonner.map(k =>
          `<td>${rad[k]}</td>`).join("")}</tr>`).join("")}
      </table>
      </div>
    </details>`;
  }

  document.getElementById("innhold").innerHTML = html;

  /* ---- Tourmanager.no-statistikk (kun for inneværende/pågående år) -------
     Hentes fra en ferdig-beregnet fil som oppdateres daglig av en
     GitHub Action. Vises under resten av innholdet. */
  visTourmanagerStatistikk(aar);

  if (etapper.length === 0) return;

  /* ---- Etappetabellen: én rad per etappe, totalrad i gult ---- */
  const totaler = {};
  for (const p of data.personer) totaler[p] = 0;
  let t = "<table class='data'><tr><th>Etappe</th>" +
    data.personer.map(p => `<th>${p}</th>`).join("") + "</tr>";
  for (const e of etapper) {
    t += `<tr><td>${typeikon(e.type)}${e.etappe}</td>` + data.personer.map(p => {
      const poeng = e.poeng[p];
      if (poeng !== undefined) totaler[p] += poeng;
      return `<td>${poeng !== undefined ? f(poeng) : ""}</td>`;
    }).join("") + "</tr>";
  }
  t += "<tr class='total'><td>Totalt</td>" +
    data.personer.map(p => `<td>${f(totaler[p])}</td>`).join("") +
    "</tr></table>";
  document.getElementById("etappetabell").innerHTML = t;

  /* ---- Utviklingsgrafen: akkumulert stilling etappe for etappe ---- */
  const akkumulert = {};
  for (const p of data.personer) akkumulert[p] = [];
  const loepende = {};
  for (const p of data.personer) loepende[p] = 0;
  for (const e of etapper) {
    for (const p of data.personer) {
      loepende[p] += e.poeng[p] ?? 0;
      akkumulert[p].push(loepende[p]);
    }
  }

  new Chart(document.getElementById("utvikling"), {
    type: "line",
    data: {
      labels: etapper.map(e => e.etappe),
      datasets: data.personer.map(person => ({
        label: person,
        data: akkumulert[person],
        borderColor: data.farger[person],
        backgroundColor: data.farger[person],
        pointRadius: 2,
        tension: 0.2,
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "top", align: "start",
          labels: { font: { family: "Albert Sans" }, boxWidth: 24, boxHeight: 3 } },
        tooltip: { mode: "index", intersect: false,
          callbacks: { title: items => "Etter etappe " + items[0].label } },
      },
      scales: {
        y: { beginAtZero: true, ticks: { font: { family: "Albert Sans" },
          callback: v => formatTall(v) } },
        x: { grid: { display: false },
          title: { display: true, text: "Etappe",
            font: { family: "Albert Sans" } },
          ticks: { font: { family: "Albert Sans" } } },
      },
    },
  });

  /* ---- Poeng per etappe: liggende stablede søyler ---- */
  /* Liten plugin: skriver totalsummen ytterst på hver stolpe */
  const totalEtikett = {
    id: "totalEtikett",
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const meta = chart.getDatasetMeta(chart.data.datasets.length - 1);
      ctx.save();
      ctx.font = "600 13px Albert Sans";
      ctx.fillStyle = "#1a1a1a";
      ctx.textBaseline = "middle";
      meta.data.forEach((stolpe, i) => {
        const total = etapper[i]
          ? data.personer.reduce((s, p) => s + (etapper[i].poeng[p] ?? 0), 0)
          : 0;
        ctx.fillText("  " + formatTall(total), stolpe.x, stolpe.y);
      });
      ctx.restore();
    },
  };

  /* Liten plugin: tegner y-akse-etikettene selv, slik at hver etappe får
     terrengikonet først og etappenummeret etter — likt etappetabellen.
     Standard-etikettene er skrudd av (ticks.display = false) og vi
     reserverer plass til venstre via layout-padding. */
  const etappeIkonEtikett = {
    id: "etappeIkonEtikett",
    afterDraw(chart) {
      const yAkse = chart.scales.y;
      const { ctx, chartArea } = chart;
      ctx.save();
      ctx.font = "13px Albert Sans";
      ctx.fillStyle = "#444";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      const ikonSenterX = chartArea.left - 40;
      const nummerX = chartArea.left - 26;
      etapper.forEach((e, i) => {
        const y = yAkse.getPixelForTick(i);
        tegnEtappeikon(ctx, e.type, ikonSenterX, y, 17);
        ctx.fillText(String(e.etappe), nummerX, y);
      });
      ctx.restore();
    },
  };

  new Chart(document.getElementById("perEtappe"), {
    type: "bar",
    plugins: [totalEtikett, etappeIkonEtikett],
    data: {
      labels: etapper.map(e => String(e.etappe)),
      datasets: data.personer.map(person => ({
        label: person,
        data: etapper.map(e => e.poeng[person] ?? 0),
        backgroundColor: data.farger[person],
      })),
    },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { left: 56, right: 48 } },
      plugins: {
        legend: { position: "top", align: "start",
          labels: { font: { family: "Albert Sans" }, boxWidth: 14 } },
        tooltip: { callbacks: {
          title: items => "Etappe " + (etapper[items[0].dataIndex]?.etappe ?? ""),
          label: ctx => ctx.dataset.label + ": " + formatTall(ctx.parsed.x) } },
      },
      scales: {
        x: { stacked: true, ticks: { font: { family: "Albert Sans" },
          callback: v => formatTall(v) } },
        y: { stacked: true, grid: { display: false },
          ticks: { display: false } },
      },
    },
  });

}).catch(feil => {
  document.getElementById("innhold").innerHTML =
    "<p>Klarte ikke å hente dataene akkurat nå. Prøv å laste siden på nytt.</p>";
});

/* ==========================================================================
   Tourmanager.no-statistikk
   Rytterstatistikk fra hele tourmanager.no-verdenen — en hyllest til og
   et supplement ved siden av den interne firekampen. Dataene er ferdig
   beregnet og lagret av en GitHub Action; her vises de bare.
   ========================================================================== */
async function visTourmanagerStatistikk(aar) {
  let data;
  try {
    const svar = await fetch("data/tourmanager-" + aar + ".json");
    if (!svar.ok) return;              // ingen fil for dette året → hopp over
    data = await svar.json();
  } catch (e) {
    return;                            // filen finnes ikke → vis ingenting
  }
  if (!data.etapper || data.etapper.length === 0) return;

  const f = formatTall;
  const container = document.createElement("div");

  const seksjon = document.createElement("div");
  seksjon.innerHTML = `
    <div class="skille skille--gul"></div>
    <h2>Rytterstatistikk fra touren</h2>
    <p>Tall og kuriosa om enkeltrytterne.</p>`;
  container.appendChild(seksjon);

  /* En liten liste-hjelper: navn, lag og en verdi */
  const rad = (r, verdi) =>
    `<li><strong>${r.navn}</strong> <span style="color:var(--tekst-daus)">
     (${r.lag})</span> — ${verdi}</li>`;

  /* Etappene, nyeste først, hver i en sammenleggbar seksjon */
  [...data.etapper].reverse().forEach((e, i) => {
    const d = document.createElement("details");
    d.className = "tm-etappe";

    const topp = e.toppscorere[0];
    d.innerHTML = `
      <summary>
        <span class="tm-pil" aria-hidden="true"></span>
        <strong>Etappe ${e.nummer}</strong> — ${e.terreng}
        <span style="color:var(--tekst-daus)">${e.fra} → ${e.til}</span>
        <span class="tm-teaser">${topp.navn}: ${topp.poeng} p</span>
      </summary>
      <div class="tm-innhold">
        <div class="tm-kolonner">
          <div>
            <h4>Etappens toppscorere</h4>
            <ol class="rangering">${e.toppscorere.map(r =>
              rad(r, `${r.poeng} p`)).join("")}</ol>
          </div>
          <div>
            <h4>Beste kjøp <span class="tm-hint">(poeng per million)</span></h4>
            <ol class="rangering">${e.beste_kjop.map(r =>
              rad(r, `${r.perMill} p/M · ${r.pris} M`)).join("")}</ol>
          </div>
        </div>
        <div class="tm-kolonner">
          <div>
            <h4>Mest poeng, lavt eierskap <span class="tm-hint">(få hadde dem på laget)</span></h4>
            <ol class="rangering">${e.benkesorg.map(r =>
              rad(r, `${r.poeng} p · eid av ${r.eid} %`)).join("")}</ol>
          </div>
          <div>
            <h4>Luksusfellene <span class="tm-hint">(dyre, skuffet)</span></h4>
            <ol class="rangering">${e.luksusfeller.map(r =>
              rad(r, `${r.poeng} p · ${r.pris} M`)).join("")}</ol>
          </div>
        </div>
        <div class="tm-kolonner">
          <div>
            <h4>Kategorikonger</h4>
            <ol class="rangering">${e.kategorikonger.map(k =>
              `<li>${k.kategori}: <strong>${k.navn}</strong> — ${k.poeng} p</li>`
            ).join("")}</ol>
          </div>
          <div>
            <h4>Mest eide</h4>
            <ol class="rangering">${e.mest_eide.map(r =>
              rad(r, `${r.eid} %`)).join("")}</ol>
          </div>
        </div>
      </div>`;
    container.appendChild(d);
  });

  const kilde = document.createElement("p");
  kilde.className = "tm-kilde";
  kilde.innerHTML = `Statistikken oppdateres daglig fra tourmanager.no.
    Sist oppdatert: ${data.oppdatert}.`;
  container.appendChild(kilde);

  document.querySelector("main").appendChild(container);
}
</script>

</body>
</html>
